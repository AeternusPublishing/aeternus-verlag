name: Deploy Eleventy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Triggers every time you push to your main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Eleventy Site
        run: npm run build # Runs your Eleventy compiler setup

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Points to your Eleventy output directory

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4